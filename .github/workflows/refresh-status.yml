name: Refresh status snapshots

# Official status/incident + auto-reset snapshots are free, so they refresh hourly.
# The Tavily-powered social search runs less often (refresh-social.yml) to stay
# within a narrow monthly credit budget.

on:
  workflow_dispatch:
  schedule:
    - cron: '17 * * * *'

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # Appends status/auto-reset snapshots to Supabase (signal_snapshots) — no
      # commit/redeploy; the live site reads the latest row at runtime.
      - run: npm run fetch:status
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
