name: Refresh status snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: '17 * * * *'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run fetch:status
      - run: npm run build
      - name: Commit updated snapshot
        run: |
          if [[ -n "$(git status --short public/data/status-snapshot.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/data/status-snapshot.json
            git commit -m "Refresh status snapshot"
            git push
          else
            echo "No snapshot changes"
          fi
