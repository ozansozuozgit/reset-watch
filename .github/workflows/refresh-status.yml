name: Refresh public signal snapshots

on:
  workflow_dispatch:
  schedule:
    - cron: '17 * * * *'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run fetch:data
      - run: npm run build
      - name: Commit updated snapshots
        run: |
          if [[ -n "$(git status --short public/data/status-snapshot.json public/data/social-snapshot.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/data/status-snapshot.json public/data/social-snapshot.json public/data/social-overrides.json
            git commit -m "Refresh public signal snapshots"
            git push
          else
            echo "No snapshot changes"
          fi
