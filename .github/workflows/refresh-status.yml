name: Refresh public signal snapshots

on:
  workflow_dispatch:
  schedule:
    - cron: '17 * * * *'

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # Fetchers append each snapshot to Supabase (signal_snapshots) instead of
      # committing JSON files back into the repo. No commit/push, no redeploy —
      # the live site reads the latest row at runtime.
      - run: npm run fetch:data
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
